name: Init E2E

on:
  pull_request:
    branches: [main]
    paths:
      - 'headroom/**'
      - 'crates/**'
      - 'docker/**'
      - 'Dockerfile'
      - 'e2e/**'
      - 'scripts/install*'
      - 'pyproject.toml'
      - 'Cargo.toml'
      - 'Cargo.lock'
      - 'rust-toolchain.toml'
      - 'uv.lock'
      - '.claude-plugin'
      - '.github/plugin/**'
      - 'plugins/headroom-agent-hooks/**'
      - '.github/workflows/init-e2e.yml'
  push:
    branches: [main]
  workflow_dispatch:

concurrency:
  group: init-e2e-${{ github.ref }}
  cancel-in-progress: ${{ github.ref != 'refs/heads/main' }}

jobs:
  docker-init-e2e:
    runs-on: ubuntu-latest
    timeout-minutes: 45

    steps:
      - uses: actions/checkout@v7

      - name: Build init e2e image
        run: docker build -f e2e/init/Dockerfile -t headroom-init-e2e .

      - name: Run init e2e container
        run: docker run --rm headroom-init-e2e
