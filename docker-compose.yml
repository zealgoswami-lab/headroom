services:
  headroom-proxy:
    build:
      context: .
      args:
        HEADROOM_EXTRAS: "proxy,code,ml"
        HEADROOM_BUILD_VERSION: ${HEADROOM_BUILD_VERSION:-source-build}
    command: ["--host", "0.0.0.0"]
    environment:
      - HEADROOM_HOST=0.0.0.0
      - HOME=/home/nonroot
      # Keep all Headroom read/write state on the named volume below.
      - HEADROOM_WORKSPACE_DIR=/home/nonroot/.headroom
      - HEADROOM_CONFIG_DIR=/home/nonroot/.headroom/config
      # if you want to use a custom OpenAI-compatible API endpoint,
      # uncomment and set the following line with the desired URL
      # - OPENAI_TARGET_API_URL=https://api.x.ai
      # CLI-filtering dashboard figures require the `rtk` binary inside this
      # container; it is not installed by this image. See docs/content/docs/docker-install.mdx.
    ports:
      - "8787:8787"
    volumes:
      - headroom_workspace:/home/nonroot/.headroom
    healthcheck:
      test: ["CMD", "curl", "--fail", "--silent", "http://127.0.0.1:8787/readyz"]
      interval: 30s
      timeout: 5s
      retries: 3
      start_period: 20s
    depends_on:
      - qdrant
      - neo4j

  # Vector database for semantic search
  qdrant:
    image: qdrant/qdrant:v1.17.1
    ports:
      - "6333:6333"  # REST API
      - "6334:6334"  # gRPC
    volumes:
      - qdrant_data:/qdrant/storage
    environment:
      - QDRANT__SERVICE__GRPC_PORT=6334

  # Graph database for relationships and multi-hop reasoning
  neo4j:
    image: neo4j:5.26
    ports:
      - "7474:7474"  # HTTP (Browser)
      - "7687:7687"  # Bolt
    volumes:
      - neo4j_data:/data
    environment:
      - NEO4J_AUTH=${NEO4J_AUTH:-neo4j/devpassword}
      - NEO4J_PLUGINS=["apoc"]
      - NEO4J_apoc_export_file_enabled=true
      - NEO4J_apoc_import_file_enabled=true
      - NEO4J_apoc_import_file_use__neo4j__config=true

  # Build the patched Copilot Chat VSIX that routes LLM requests through headroom.
  # Usage:
  #   docker compose --profile plugin run --rm vscode-plugin-builder
  #   code --install-extension ./plugin/copilot-proxy.vsix --force
  vscode-plugin-builder:
    build:
      context: .
      dockerfile: Dockerfile.vscode-plugin
      args:
        VSCODE_FORK_REPO: ${VSCODE_FORK_REPO:-https://github.com/damnthonyy/vscode.git}
        VSCODE_FORK_COMMIT: ${VSCODE_FORK_COMMIT:-bd6c147a19b5934e8008e8e1b518383b2de90218}
    volumes:
      - ./plugin:/output
    profiles:
      - plugin

volumes:
  headroom_workspace:    # persists dashboard savings/history, logs, config, memory state, session stats, and TOIN
  qdrant_data:
  neo4j_data:
